<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- HERO -->

        </video>
        <div class="hero-overlay"></div>
        <nav id="nav">
            <div class="nav-logo">Royal Pane</div>
            <ul class="nav-links">
                <li><a href="#services">Services</a></li>
                <li><a href="#work">Work</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
        <div class="hero-content">
           <p class="hero-eyebrow">Southern Vermont</p>
            <h1>Improving the<br/><em>View</em> Since 2002</h1>

  <!-- INTRO -->
<section id="intro">
    <div class="intro-inner">
        <p class="intro-line">
            Most people don't notice clean windows —
        </p>

        </p>
